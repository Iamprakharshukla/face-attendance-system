<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <i class="fas fa-face-recognition"></i>
                AI Attendance System
            </div>
            <ul class="navbar-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/register">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 2rem; color: var(--text-dark);">
            <i class="fas fa-chart-line"></i> Attendance Dashboard
        </h1>

        <!-- Controls -->
        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-body">
                <h3>Generate Report</h3>
                <div class="grid grid-3" style="margin-top: 1rem;">
                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label>End Date</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="form-group">
                        <label>&nbsp;</label>
                        <button class="btn btn-primary btn-block" onclick="generateReport()">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                </div>

                <div style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                    <button class="btn btn-success" onclick="exportAttendance()">
                        <i class="fas fa-download"></i> Export Attendance
                    </button>
                    <button class="btn btn-secondary" onclick="exportUnknownFaces()">
                        <i class="fas fa-download"></i> Export Unknown Faces
                    </button>
                    <button class="btn btn-warning" onclick="sendReport()">
                        <i class="fas fa-envelope"></i> Send Report
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="grid grid-4" style="margin-bottom: 2rem;">
            <div class="stat-box">
                <i class="fas fa-users-tie" style="font-size: 2rem; color: var(--primary-color);"></i>
                <div class="stat-number" id="totalRecords">0</div>
                <div class="stat-label">Total Records</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-check-circle" style="font-size: 2rem; color: var(--success-color);"></i>
                <div class="stat-number" id="presentCount">0</div>
                <div class="stat-label">Present</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-question-circle" style="font-size: 2rem; color: var(--warning-color);"></i>
                <div class="stat-number" id="unknownCount">0</div>
                <div class="stat-label">Unknown</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-percentage" style="font-size: 2rem; color: var(--secondary-color);"></i>
                <div class="stat-number" id="presentPercentage">0%</div>
                <div class="stat-label">Present Rate</div>
            </div>
        </div>

        <!-- Attendance Table -->
        <div class="card">
            <div class="card-header">
                <h3>Attendance Records</h3>
            </div>
            <div class="card-body">
                <div style="overflow-x: auto;">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Person Name</th>
                                <th>Confidence</th>
                                <th>Status</th>
                                <th>Source</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem;">
                                    <div class="spinner"></div>
                                    Loading...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Send Report</h2>
                <button class="close-btn" onclick="closeReportModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Organization Email</label>
                    <input type="email" id="reportEmail" placeholder="admin@organization.com" required>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="includeCSV">
                        Include CSV File
                    </label>
                </div>
                <button class="btn btn-primary btn-block" onclick="submitReport()">
                    <i class="fas fa-send"></i> Send Report
                </button>
            </div>
        </div>
    </div>

    <script>
        // Set today's date as default
        document.addEventListener('DOMContentLoaded', function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').value = today;
            document.getElementById('endDate').value = today;
            loadAttendanceData();
        });

        async function loadAttendanceData() {
            try {
                const response = await fetch('/admin/today-attendance');
                const data = await response.json();
                displayAttendanceTable(data.records);
                updateStats(data.records);
            } catch (error) {
                console.error('Error loading attendance:', error);
            }
        }

        function displayAttendanceTable(records) {
            const tbody = document.getElementById('attendanceTableBody');
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 2rem;">No records yet</td></tr>';
                return;
            }

            tbody.innerHTML = records.map(record => `
                <tr>
                    <td>${record.Date}</td>
                    <td>${record.Time}</td>
                    <td>
                        ${record.Person_Name === 'Unknown' 
                            ? '<span style="color: var(--danger-color);"><i class="fas fa-user-secret"></i> Unknown</span>' 
                            : record.Person_Name}
                    </td>
                    <td>${(parseFloat(record.Confidence) * 100).toFixed(2)}%</td>
                    <td>
                        <span style="background: var(--success-color); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.85rem;">
                            ${record.Status}
                        </span>
                    </td>
                    <td><small>${record.Source}</small></td>
                </tr>
            `).join('');
        }

        function updateStats(records) {
            const total = records.length;
            const present = records.filter(r => r.Person_Name !== 'Unknown').length;
            const unknown = total - present;
            const percentage = total > 0 ? ((present / total) * 100).toFixed(1) : 0;

            document.getElementById('totalRecords').textContent = total;
            document.getElementById('presentCount').textContent = present;
            document.getElementById('unknownCount').textContent = unknown;
            document.getElementById('presentPercentage').textContent = percentage + '%';
        }

        async function generateReport() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            try {
                const response = await fetch(`/admin/attendance-report?start_date=${startDate}&end_date=${endDate}`);
                const data = await response.json();
                displayAttendanceTable(data.records);
                updateStats(data.records);
            } catch (error) {
                alert('Error generating report: ' + error);
            }
        }

        function exportAttendance() {
            window.location.href = '/admin/export-attendance';
        }

        function exportUnknownFaces() {
            window.location.href = '/admin/export-unknown-faces';
        }

        function sendReport() {
            document.getElementById('reportModal').classList.add('show');
        }

        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('show');
        }

        async function submitReport() {
            const email = document.getElementById('reportEmail').value;
            const includeCSV = document.getElementById('includeCSV').checked;

            if (!email) {
                alert('Please enter an email address');
                return;
            }

            try {
                const response = await fetch('/email/send-report', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        include_csv: includeCSV
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('Report sent successfully!');
                    closeReportModal();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error sending report: ' + error);
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(loadAttendanceData, 30000);
    </script>
</body>
</html>
